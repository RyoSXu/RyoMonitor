<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RyoMonitor</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="alternate icon" href="/assets/logo.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
<link rel="manifest" href="/assets/site.webmanifest">
<meta name="theme-color" content="#1A68CF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RyoMonitor">
<script>
// 尽早设置主题，避免浅色偏好下的深色闪烁（FOUC）。
(function(){
  var saved = localStorage.getItem("ryo-monitor-theme");
  var theme = (saved === "light" || saved === "dark")
    ? saved
    : (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
  document.documentElement.setAttribute("data-theme", theme);
})();
</script>
<style>
:root{
  --bg:#111;
  --fg:#eee;
  --muted:#aaa;
  --card:#1b1b1b;
  --card-alt:#1a1a1a;
  --border:#333;
  --pill-fg:#ddd;
  --btn-hover:#333;
  --dot-off:#777;
  --dot-on:#77ff8a;
  --dot-bad:#ff8a8a;
  --err:#ff9b9b;
  --net-rx:#4ea1ff;
  --net-tx:#5ad19b;
}

[data-theme="light"]{
  --bg:#f4f5f7;
  --fg:#1c1c1e;
  --muted:#6b7280;
  --card:#ffffff;
  --card-alt:#ffffff;
  --border:#e3e5ea;
  --pill-fg:#374151;
  --btn-hover:#eceef2;
  --dot-off:#9ca3af;
  --dot-on:#22a559;
  --dot-bad:#e0564f;
  --err:#c0392b;
  --net-rx:#2f74c0;
  --net-tx:#1f9d6b;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--fg);
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  transition:background .2s ease,color .2s ease;
}

main{
  max-width:900px;
  margin:0 auto;
  padding:24px;
}

.header{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:16px;
  margin-bottom:12px;
}

h1{
  margin:0 0 6px;
  font-size:24px;
}

.sub{
  color:var(--muted);
  margin-bottom:12px;
  font-size:14px;
}

.controls{
  display:flex;
  gap:8px;
  flex:0 0 auto;
}

.ctrl-btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:40px;
  height:32px;
  padding:0 12px;
  border:1px solid var(--border);
  border-radius:999px;
  background:var(--card-alt);
  color:var(--fg);
  cursor:pointer;
  font:inherit;
  font-size:13px;
  line-height:1;
  transition:background .15s ease,border-color .15s ease;
}

.ctrl-btn:hover{
  background:var(--btn-hover);
}

#theme-toggle{
  font-size:15px;
  padding:0;
}

.service-strip{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:20px;
}

.pill{
  display:inline-flex;
  align-items:center;
  gap:7px;
  padding:6px 10px;
  border:1px solid var(--border);
  border-radius:999px;
  background:var(--card-alt);
  font-size:13px;
  color:var(--pill-fg);
}

.dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:var(--dot-off);
}

.pill.active .dot{
  background:var(--dot-on);
}

.pill.inactive .dot,
.pill.failed .dot,
.pill.unknown .dot{
  background:var(--dot-bad);
}

.grid{
  display:grid;
  gap:12px;
  margin-bottom:20px;
}

.metrics{
  grid-template-columns:repeat(4,1fr);
}

/* 桌面：第一行 CPU/内存/磁盘/Swap，第二行 网络(2列) + 平均负载(跨2列) */
.metrics > :nth-child(1){grid-column:1;grid-row:1;}
.metrics > :nth-child(2){grid-column:2;grid-row:1;}
.metrics > :nth-child(3){grid-column:3;grid-row:1;}
.metrics > :nth-child(4){grid-column:4;grid-row:1;}
.metrics > :nth-child(5){grid-column:1 / span 2;grid-row:2;}
.metrics > :nth-child(6){grid-column:3 / span 2;grid-row:2;}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:16px;
  box-sizing:border-box;
  min-height:118px;
  display:flex;
  flex-direction:column;
}

.label{
  color:var(--muted);
  font-size:13px;
  margin-bottom:8px;
}

.value{
  font-size:22px;
  font-weight:700;
  line-height:1.2;
  white-space:pre-line;
}

.detail{
  margin-top:8px;
  font-size:14px;
  font-weight:600;
  line-height:1.45;
  color:var(--fg);
  white-space:pre-line;
  min-height:1.45em;
}

.detail-placeholder{
  visibility:hidden;
}

.load-detail{
  font-size:14px;
  font-weight:600;
  line-height:1.6;
  white-space:pre-line;
}

/* 细条进度条：嵌在卡片内部，不改变卡片尺寸 */
.bar{
  height:6px;
  margin-top:10px;
  border-radius:999px;
  background:var(--border);
  overflow:hidden;
}

.bar > span{
  display:block;
  height:100%;
  width:0;
  border-radius:999px;
  background:var(--dot-on);
  transition:width .45s ease,background .3s ease;
}

.bar.warn > span{background:#e0a23b;}
.bar.crit > span{background:var(--dot-bad);}

/* 网络迷你折线图（下行/上行随时间，自动缩放） */
.net-card{
  container-type:inline-size;
}

.value.net-value{
  display:flex;
  justify-content:flex-start;
  align-items:baseline;
  gap:10px;
  width:100%;
  max-width:100%;
  min-width:0;
  font-size:clamp(15px,calc(100cqw / 13.2),18px);
  font-weight:700;
  line-height:1.2;
  white-space:nowrap;
  overflow:hidden;
}

.net-item{
  display:inline-flex;
  align-items:baseline;
  gap:1px;
  flex:0 0 auto;
  font-variant-numeric:tabular-nums;
}

.net-arrow{
  font-size:0.82em;
  flex-shrink:0;
}

.net-num{font-variant-numeric:tabular-nums;}

.net-unit{
  font-size:0.85em;
  font-weight:600;
}

.net-value .rx{color:var(--net-rx);}
.net-value .tx{color:var(--net-tx);}

.spark{
  display:block;
  width:100%;
  height:42px;
  margin-top:10px;
  overflow:visible;
}

.spark path{
  fill:none;
  stroke-width:1.5;
  vector-effect:non-scaling-stroke;
}

.spark .spark-rx{stroke:var(--net-rx);}
.spark .spark-tx{stroke:var(--net-tx);}

/* 平均负载：三行归一化（load / 核数）横条 */
.load-rows{
  display:flex;
  flex-direction:column;
  gap:9px;
  margin-top:4px;
}

.load-row{
  display:grid;
  grid-template-columns:3em 1fr 3em;
  align-items:center;
  gap:12px 8px;
}

.load-name{
  color:var(--muted);
  font-size:13px;
  white-space:nowrap;
}

.load-bar{
  margin-top:0;
}

.load-num{
  font-size:14px;
  font-weight:600;
  font-variant-numeric:tabular-nums;
  text-align:right;
  justify-self:end;
  width:100%;
}

/* 与 UI 一致的自定义悬浮提示：替代原生 title，hover 立即显示 */
.tooltip{
  position:fixed;
  z-index:50;
  pointer-events:none;
  background:var(--card);
  color:var(--fg);
  border:1px solid var(--border);
  border-radius:8px;
  padding:7px 10px;
  font-size:12px;
  line-height:1.5;
  box-shadow:0 6px 20px rgba(0,0,0,.28);
  opacity:0;
  transform:translateY(3px);
  transition:opacity .12s ease,transform .12s ease;
  white-space:nowrap;
  max-width:280px;
}

.tooltip.show{
  opacity:1;
  transform:translateY(0);
}

.tooltip .tt-unit{
  color:var(--muted);
  font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  font-size:11px;
}

.table-card{
  margin-top:20px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
  box-sizing:border-box;
}

.table-card table{
  width:100%;
  margin:0;
  border:0;
  border-radius:0;
  border-collapse:separate;
  border-spacing:0;
  background:var(--card);
}

th,td{
  padding:10px;
  border-bottom:1px solid var(--border);
  text-align:left;
  font-size:13px;
}

th{
  color:var(--muted);
  font-weight:500;
}

tbody tr:last-child td{
  border-bottom:0;
}

.err{
  color:var(--err);
  margin-top:16px;
  font-size:13px;
}

@media(max-width:760px){
  main{
    padding:20px;
  }

  .service-strip{
    flex-wrap:nowrap;
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
    padding-bottom:2px;
  }

  .service-strip::-webkit-scrollbar{
    display:none;
  }

  .metrics{
    grid-template-columns:repeat(2,1fr);
  }

  .metrics > .card{
    grid-column:auto;
    grid-row:auto;
  }

  .metrics .net-card,
  .metrics .load-card{
    grid-column:1 / -1;
  }
}
</style>
</head>

<body>
<main>
<div class="header">
  <div>
    <h1>RyoMonitor</h1>
    <div class="sub" id="subtitle">加载中...</div>
  </div>
  <div class="controls">
    <button type="button" id="lang-toggle" class="ctrl-btn" aria-label="Language">中文</button>
    <button type="button" id="theme-toggle" class="ctrl-btn" aria-label="Theme">☾</button>
  </div>
</div>

<div class="service-strip">
  <div class="pill"><span class="dot"></span><span data-i18n="loading">加载中...</span></div>
</div>

<div class="grid metrics">
  <div class="card">
    <div class="label" data-i18n="cpu">CPU</div>
    <div class="value" id="cpu">--%</div>
    <div class="bar" id="cpu-bar"><span></span></div>
    <div class="detail detail-placeholder" aria-hidden="true">&nbsp;</div>
  </div>

  <div class="card">
    <div class="label" data-i18n="memory">内存</div>
    <div class="value" id="mem">--%</div>
    <div class="bar" id="mem-bar"><span></span></div>
    <div class="detail" id="mem-detail">--</div>
  </div>

  <div class="card">
    <div class="label" data-i18n="disk">磁盘</div>
    <div class="value" id="disk">--%</div>
    <div class="bar" id="disk-bar"><span></span></div>
    <div class="detail" id="disk-detail">--</div>
  </div>

  <div class="card">
    <div class="label" data-i18n="swap">Swap</div>
    <div class="value" id="swap">--%</div>
    <div class="bar" id="swap-bar"><span></span></div>
    <div class="detail" id="swap-detail">--</div>
  </div>

  <div class="card net-card">
    <div class="label" data-i18n="network">网络</div>
    <div class="value net-value" id="net">--</div>
    <svg class="spark" id="net-spark" viewBox="0 0 100 42" preserveAspectRatio="none" aria-hidden="true">
      <path class="spark-rx" id="net-spark-rx"></path>
      <path class="spark-tx" id="net-spark-tx"></path>
    </svg>
  </div>

  <div class="card load-card">
    <div class="label" data-i18n="loadAverage">平均负载</div>
    <div class="load-rows">
      <div class="load-row">
        <span class="load-name" data-i18n="load1m">1 分钟</span>
        <div class="bar load-bar" id="load1-bar"><span></span></div>
        <span class="load-num" id="load1-num">--</span>
      </div>
      <div class="load-row">
        <span class="load-name" data-i18n="load5m">5 分钟</span>
        <div class="bar load-bar" id="load5-bar"><span></span></div>
        <span class="load-num" id="load5-num">--</span>
      </div>
      <div class="load-row">
        <span class="load-name" data-i18n="load15m">15 分钟</span>
        <div class="bar load-bar" id="load15-bar"><span></span></div>
        <span class="load-num" id="load15-num">--</span>
      </div>
    </div>
  </div>
</div>

<div class="table-card">
<table>
<thead>
<tr>
  <th>PID</th>
  <th data-i18n="process">进程</th>
  <th>CPU</th>
  <th data-i18n="memory">内存</th>
  <th data-i18n="rss">实际占用</th>
</tr>
</thead>
<tbody id="processes">
<tr><td colspan="5" data-i18n="loading">加载中...</td></tr>
</tbody>
</table>
</div>

<div class="err" id="error"></div>
</main>

<script>
const translations = {
  zh: {
    loading: "加载中...",
    updated: "更新时间",
    cpu: "CPU",
    memory: "内存",
    disk: "磁盘",
    network: "网络",
    swap: "Swap",
    loadAverage: "平均负载",
    process: "进程",
    rss: "实际占用",
    used: "已用",
    total: "总计",
    oneMinuteLoad: "过去 1 分钟负载",
    fiveMinuteLoad: "过去 5 分钟负载",
    fifteenMinuteLoad: "过去 15 分钟负载",
    load1m: "1 分钟",
    load5m: "5 分钟",
    load15m: "15 分钟",
    noData: "暂无数据",
    statusActive: "运行中",
    statusInactive: "已停止",
    statusFailed: "异常",
    statusUnknown: "未知",
    uptimeDay: "天",
    uptimeHour: "小时",
    uptimeMinute: "分钟",
    uptimePrefix: "已运行"
  },
  en: {
    loading: "Loading...",
    updated: "Updated",
    cpu: "CPU",
    memory: "Memory",
    disk: "Disk",
    network: "Network",
    swap: "Swap",
    loadAverage: "Load average",
    process: "Process",
    rss: "RSS",
    used: "Used",
    total: "Total",
    oneMinuteLoad: "1 minute load",
    fiveMinuteLoad: "5 minute load",
    fifteenMinuteLoad: "15 minute load",
    load1m: "1 min",
    load5m: "5 min",
    load15m: "15 min",
    noData: "No data",
    statusActive: "Running",
    statusInactive: "Stopped",
    statusFailed: "Failed",
    statusUnknown: "Unknown",
    uptimeDay: "d",
    uptimeHour: "h",
    uptimeMinute: "m",
    uptimePrefix: "Up"
  }
};

let currentStatus = null;

function initialLanguage() {
  const saved = localStorage.getItem("ryo-monitor-lang");
  if (saved === "zh" || saved === "en") return saved;
  return navigator.language && navigator.language.toLowerCase().startsWith("zh") ? "zh" : "en";
}

let currentLang = initialLanguage();

function t(key) {
  return translations[currentLang][key] || translations.en[key] || key;
}

function text(id, value) {
  document.getElementById(id).textContent = value;
}

// 设置卡片内细条进度：宽度按百分比，颜色按阈值分级（绿 / 黄 / 红）。
function setBar(id, raw) {
  const bar = document.getElementById(id);
  if (!bar) return;
  const pct = Math.max(0, Math.min(100, parseFloat(raw)));
  const fill = bar.firstElementChild;
  if (!Number.isFinite(pct)) {
    fill.style.width = "0%";
    return;
  }
  fill.style.width = pct + "%";
  bar.classList.toggle("warn", pct >= 70 && pct < 90);
  bar.classList.toggle("crit", pct >= 90);
}

// 平均负载条：按 load/核数 归一化（每核 1.0 = 满载 100%）。
function formatLoad(raw) {
  const v = parseFloat(raw);
  if (!Number.isFinite(v)) return "--";
  return v.toFixed(2);
}

function setLoad(barId, numId, raw, cores) {
  text(numId, formatLoad(raw));
  const v = parseFloat(raw);
  setBar(barId, Number.isFinite(v) ? (v / cores) * 100 : NaN);
}

// ---------- 网络迷你折线图 ----------

const NET_HISTORY = 60; // 保留最近 60 个采样点（约 1 分钟）
const netRxHist = [];
const netTxHist = [];

function pushHistory(arr, value) {
  arr.push(Number.isFinite(value) ? value : 0);
  if (arr.length > NET_HISTORY) arr.shift();
}

// 将一组数值映射为 SVG path（viewBox 100 x 42，自动按共享峰值缩放）。
function sparkPath(arr, max) {
  if (arr.length < 2) return "";
  const w = 100, h = 42, pad = 3;
  const span = h - pad * 2;
  const denom = max > 0 ? max : 1;
  const stepX = w / (NET_HISTORY - 1);
  // 右对齐：最新点贴在最右侧，历史向左延伸。
  const offset = w - (arr.length - 1) * stepX;
  let d = "";
  for (let i = 0; i < arr.length; i++) {
    const x = offset + i * stepX;
    const y = h - pad - (arr[i] / denom) * span;
    d += (i === 0 ? "M" : "L") + x.toFixed(2) + " " + y.toFixed(2) + " ";
  }
  return d.trim();
}

// 将 KB/s 格式化为 KB/s、MB/s 或 GB/s（≥1 MB 起保留两位小数）。
function formatNetSpeed(kb) {
  const v = parseFloat(kb);
  if (!Number.isFinite(v)) return {num: "--", unit: "KB/s"};
  if (v >= 1024 * 1024) return {num: (v / (1024 * 1024)).toFixed(2), unit: "GB/s"};
  if (v >= 1024) return {num: (v / 1024).toFixed(2), unit: "MB/s"};
  return {num: String(Math.round(v)), unit: "KB/s"};
}

function netSpeedItem(cls, arrow, kb) {
  const {num, unit} = formatNetSpeed(kb);
  return `<span class="net-item ${cls}"><span class="net-arrow">${arrow}</span><span class="net-num">${num}</span><span class="net-unit">${unit}</span></span>`;
}

function renderNetwork(rxKb, txKb) {
  const rx = parseFloat(rxKb), tx = parseFloat(txKb);
  document.getElementById("net").innerHTML =
    netSpeedItem("rx", "↓", rxKb) + netSpeedItem("tx", "↑", txKb);
  pushHistory(netRxHist, rx);
  pushHistory(netTxHist, tx);
  // 下行/上行共享同一纵轴峰值，便于直接比较两条线的相对大小。
  const max = Math.max(1, ...netRxHist, ...netTxHist);
  document.getElementById("net-spark-rx").setAttribute("d", sparkPath(netRxHist, max));
  document.getElementById("net-spark-tx").setAttribute("d", sparkPath(netTxHist, max));
}

function applyStaticText() {
  document.documentElement.lang = currentLang === "zh" ? "zh-CN" : "en";
  document.querySelectorAll("[data-i18n]").forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  // 单按钮显示当前语言，点击切换到另一种。
  const langBtn = document.getElementById("lang-toggle");
  if (langBtn) langBtn.textContent = currentLang === "zh" ? "中文" : "EN";
}

function setLanguage(lang) {
  currentLang = lang;
  localStorage.setItem("ryo-monitor-lang", lang);
  applyStaticText();
  render(currentStatus);
}

// ---------- 主题（明暗）----------

function initialTheme() {
  const saved = localStorage.getItem("ryo-monitor-theme");
  if (saved === "light" || saved === "dark") return saved;
  return window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
}

let currentTheme = initialTheme();

function applyTheme() {
  document.documentElement.setAttribute("data-theme", currentTheme);
  const btn = document.getElementById("theme-toggle");
  if (btn) {
    btn.textContent = currentTheme === "dark" ? "☾" : "☀";
    btn.setAttribute("aria-label", currentTheme === "dark" ? "Switch to light theme" : "Switch to dark theme");
  }
}

function toggleTheme() {
  currentTheme = currentTheme === "dark" ? "light" : "dark";
  localStorage.setItem("ryo-monitor-theme", currentTheme);
  applyTheme();
}

function statusName(value) {
  if (value === "active") return t("statusActive");
  if (value === "inactive") return t("statusInactive");
  if (value === "failed") return t("statusFailed");
  if (value === "unknown") return t("statusUnknown");
  return value || "--";
}

function formatUptime(seconds, fallback) {
  if (!Number.isFinite(Number(seconds))) return fallback || "--";
  const total = Number(seconds);
  const days = Math.floor(total / 86400);
  const hours = Math.floor((total % 86400) / 3600);
  const minutes = Math.floor((total % 3600) / 60);
  if (currentLang === "zh") {
    if (days > 0) return `${t("uptimePrefix")} ${days}${t("uptimeDay")} ${hours}${t("uptimeHour")} ${minutes}${t("uptimeMinute")}`;
    if (hours > 0) return `${t("uptimePrefix")} ${hours}${t("uptimeHour")} ${minutes}${t("uptimeMinute")}`;
    return `${t("uptimePrefix")} ${minutes}${t("uptimeMinute")}`;
  }
  if (days > 0) return `${t("uptimePrefix")} ${days}${t("uptimeDay")} ${hours}${t("uptimeHour")} ${minutes}${t("uptimeMinute")}`;
  if (hours > 0) return `${t("uptimePrefix")} ${hours}${t("uptimeHour")} ${minutes}${t("uptimeMinute")}`;
  return `${t("uptimePrefix")} ${minutes}${t("uptimeMinute")}`;
}

function serviceList(s) {
  return Array.isArray(s.services) ? s.services : [];
}

function escapeAttr(value) {
  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;");
}

let lastServicesSig = "";

function renderServices(services) {
  const strip = document.querySelector(".service-strip");
  // 仅在服务清单/状态变化时重建 DOM：避免每秒刷新打断 hover 提示，也省去无谓重绘。
  const sig = currentLang + "|" + services.map(s => `${s.name}:${s.unit}:${s.status}`).join(",");
  if (sig === lastServicesSig) return;
  lastServicesSig = sig;
  strip.innerHTML = services.map(service => {
    const safeName = escapeAttr(service.name || service.unit || "--");
    const status = service.status || "unknown";
    // 仅用左侧指示灯表示运行状态，名称旁不再显示状态文字；
    // hover 用自定义提示（见 tooltip）显示「状态」+「监控目标」，与 UI 一致且即时弹出。
    const unitAttr = service.unit ? ` data-unit="${escapeAttr(service.unit)}"` : "";
    return `<div class="pill ${status}" data-status="${escapeAttr(status)}"${unitAttr}><span class="dot"></span><span>${safeName}</span></div>`;
  }).join("") || `<div class="pill unknown"><span class="dot"></span><span>${t("noData")}</span></div>`;
}

function render(s) {
  if (!s) {
    text("subtitle", t("loading"));
    return;
  }

  text("subtitle", `${t("updated")}：${s.updated} · ${formatUptime(s.uptime_seconds, s.uptime)}`);

  renderServices(serviceList(s));

  text("cpu", s.cpu + "%");
  setBar("cpu-bar", s.cpu);

  text("mem", s.mem_pct + "%");
  setBar("mem-bar", s.mem_pct);
  text("mem-detail", `${t("used")} ${s.mem_used}M · ${t("total")} ${s.mem_total}M`);

  text("disk", s.disk_pct);
  setBar("disk-bar", s.disk_pct);
  text("disk-detail", `${t("used")} ${s.disk_used} · ${t("total")} ${s.disk_total}`);

  renderNetwork(s.rx_kb, s.tx_kb);

  text("swap", s.swap_pct + "%");
  setBar("swap-bar", s.swap_pct);
  text("swap-detail", `${t("used")} ${s.swap_used}M · ${t("total")} ${s.swap_total}M`);

  const cores = Number(s.cores) || 1;
  setLoad("load1-bar", "load1-num", s.load1, cores);
  setLoad("load5-bar", "load5-num", s.load5, cores);
  setLoad("load15-bar", "load15-num", s.load15, cores);

  document.getElementById("processes").innerHTML = (s.processes || []).map(p => `
    <tr>
      <td>${p.pid}</td>
      <td>${p.name}</td>
      <td>${p.cpu}%</td>
      <td>${p.mem}%</td>
      <td>${p.rss} MB</td>
    </tr>
  `).join("") || `<tr><td colspan="5">${t("noData")}</td></tr>`;

  text("error", "");
}

async function update() {
  try {
    const res = await fetch("/status.json?t=" + Date.now(), {cache: "no-store"});
    if (!res.ok) throw new Error("status.json HTTP " + res.status);
    currentStatus = await res.json();
    render(currentStatus);
  } catch (e) {
    text("error", String(e));
  }
}

// ---------- 自定义悬浮提示（替代原生 title，即时弹出）----------

const tooltipEl = document.createElement("div");
tooltipEl.className = "tooltip";
tooltipEl.setAttribute("role", "tooltip");
document.body.appendChild(tooltipEl);

let tipAnchor = null;

function buildTipHTML(pill) {
  // 状态已由胶囊左侧指示灯表达，提示只显示监控目标本身。
  const unit = pill.dataset.unit || "";
  return `<div class="tt-unit">${escapeAttr(unit)}</div>`;
}

function positionTip() {
  if (!tipAnchor) return;
  const r = tipAnchor.getBoundingClientRect();
  const tw = tooltipEl.offsetWidth;
  const gap = 8;
  let left = r.left + r.width / 2 - tw / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - tw - 8));
  // 固定显示在胶囊下方。
  tooltipEl.style.left = left + "px";
  tooltipEl.style.top = (r.bottom + gap) + "px";
}

function showTip(pill) {
  if (!pill.dataset.unit) return; // 无监控目标则不弹提示
  tipAnchor = pill;
  tooltipEl.innerHTML = buildTipHTML(pill);
  positionTip();
  tooltipEl.classList.add("show");
}

function hideTip() {
  tipAnchor = null;
  tooltipEl.classList.remove("show");
}

document.addEventListener("mouseover", e => {
  const pill = e.target.closest && e.target.closest(".pill[data-status]");
  if (pill) showTip(pill);
});
document.addEventListener("mouseout", e => {
  const pill = e.target.closest && e.target.closest(".pill[data-status]");
  if (pill && !pill.contains(e.relatedTarget)) hideTip();
});
window.addEventListener("scroll", hideTip, true);
window.addEventListener("resize", hideTip);

document.getElementById("lang-toggle").addEventListener("click", () => {
  setLanguage(currentLang === "zh" ? "en" : "zh");
});
document.getElementById("theme-toggle").addEventListener("click", toggleTheme);

applyTheme();
applyStaticText();
render(null);
update();
setInterval(update, 1000);
</script>
</body>
</html>
