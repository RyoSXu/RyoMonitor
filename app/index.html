<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RyoMonitor</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="alternate icon" href="/assets/logo.svg" type="image/svg+xml">
<script>
// 尽早设置主题，避免浅色偏好下的深色闪烁（FOUC）。
(function(){
  var saved = localStorage.getItem("ryo-monitor-theme");
  var theme = (saved === "light" || saved === "dark")
    ? saved
    : (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
  document.documentElement.setAttribute("data-theme", theme);
})();
</script>
<style>
:root{
  --bg:#111;
  --fg:#eee;
  --muted:#aaa;
  --card:#1b1b1b;
  --card-alt:#1a1a1a;
  --border:#333;
  --pill-fg:#ddd;
  --btn-hover:#333;
  --dot-off:#777;
  --dot-on:#77ff8a;
  --dot-bad:#ff8a8a;
  --err:#ff9b9b;
}

[data-theme="light"]{
  --bg:#f4f5f7;
  --fg:#1c1c1e;
  --muted:#6b7280;
  --card:#ffffff;
  --card-alt:#ffffff;
  --border:#e3e5ea;
  --pill-fg:#374151;
  --btn-hover:#eceef2;
  --dot-off:#9ca3af;
  --dot-on:#22a559;
  --dot-bad:#e0564f;
  --err:#c0392b;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--fg);
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  transition:background .2s ease,color .2s ease;
}

main{
  max-width:900px;
  margin:0 auto;
  padding:24px;
}

.header{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:16px;
  margin-bottom:12px;
}

h1{
  margin:0 0 6px;
  font-size:24px;
}

.sub{
  color:var(--muted);
  margin-bottom:12px;
  font-size:14px;
}

.controls{
  display:flex;
  gap:8px;
  flex:0 0 auto;
}

.ctrl-btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:40px;
  height:32px;
  padding:0 12px;
  border:1px solid var(--border);
  border-radius:999px;
  background:var(--card-alt);
  color:var(--fg);
  cursor:pointer;
  font:inherit;
  font-size:13px;
  line-height:1;
  transition:background .15s ease,border-color .15s ease;
}

.ctrl-btn:hover{
  background:var(--btn-hover);
}

#theme-toggle{
  font-size:15px;
  padding:0;
}

.service-strip{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:20px;
}

.pill{
  display:inline-flex;
  align-items:center;
  gap:7px;
  padding:6px 10px;
  border:1px solid var(--border);
  border-radius:999px;
  background:var(--card-alt);
  font-size:13px;
  color:var(--pill-fg);
}

.dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:var(--dot-off);
}

.pill.active .dot{
  background:var(--dot-on);
}

.pill.inactive .dot,
.pill.failed .dot,
.pill.unknown .dot{
  background:var(--dot-bad);
}

.grid{
  display:grid;
  gap:12px;
  margin-bottom:20px;
}

.metrics-main{
  grid-template-columns:repeat(4,1fr);
}

.metrics-second{
  grid-template-columns:repeat(4,1fr);
}

.load-card{
  grid-column:span 3;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:16px;
  box-sizing:border-box;
  min-height:118px;
}

.label{
  color:var(--muted);
  font-size:13px;
  margin-bottom:8px;
}

.value{
  font-size:22px;
  font-weight:700;
  line-height:1.2;
  white-space:pre-line;
}

.detail{
  margin-top:8px;
  font-size:14px;
  font-weight:600;
  line-height:1.45;
  color:var(--fg);
  white-space:pre-line;
}

.load-detail{
  font-size:14px;
  font-weight:600;
  line-height:1.6;
  white-space:pre-line;
}

.table-card{
  margin-top:20px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
  box-sizing:border-box;
}

.table-card table{
  width:100%;
  margin:0;
  border:0;
  border-radius:0;
  border-collapse:separate;
  border-spacing:0;
  background:var(--card);
}

th,td{
  padding:10px;
  border-bottom:1px solid var(--border);
  text-align:left;
  font-size:13px;
}

th{
  color:var(--muted);
  font-weight:500;
}

tbody tr:last-child td{
  border-bottom:0;
}

.err{
  color:var(--err);
  margin-top:16px;
  font-size:13px;
}

@media(max-width:760px){
  main{
    padding:20px;
  }

  .metrics-main,
  .metrics-second{
    grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  }

  .load-card{
    grid-column:auto;
  }
}
</style>
</head>

<body>
<main>
<div class="header">
  <div>
    <h1>RyoMonitor</h1>
    <div class="sub" id="subtitle">加载中...</div>
  </div>
  <div class="controls">
    <button type="button" id="lang-toggle" class="ctrl-btn" aria-label="Language">中文</button>
    <button type="button" id="theme-toggle" class="ctrl-btn" aria-label="Theme">☾</button>
  </div>
</div>

<div class="service-strip">
  <div class="pill"><span class="dot"></span><span data-i18n="loading">加载中...</span></div>
</div>

<div class="grid metrics-main">
  <div class="card">
    <div class="label" data-i18n="cpu">CPU</div>
    <div class="value" id="cpu">--%</div>
  </div>

  <div class="card">
    <div class="label" data-i18n="memory">内存</div>
    <div class="value" id="mem">--%</div>
    <div class="detail" id="mem-detail">--</div>
  </div>

  <div class="card">
    <div class="label" data-i18n="disk">磁盘</div>
    <div class="value" id="disk">--%</div>
    <div class="detail" id="disk-detail">--</div>
  </div>

  <div class="card">
    <div class="label" data-i18n="network">网络</div>
    <div class="value" id="net">--</div>
  </div>
</div>

<div class="grid metrics-second">
  <div class="card">
    <div class="label" data-i18n="swap">Swap</div>
    <div class="value" id="swap">--%</div>
    <div class="detail" id="swap-detail">--</div>
  </div>

  <div class="card load-card">
    <div class="label" data-i18n="loadAverage">平均负载</div>
    <div class="load-detail" id="load">--</div>
  </div>
</div>

<div class="table-card">
<table>
<thead>
<tr>
  <th>PID</th>
  <th data-i18n="process">进程</th>
  <th>CPU</th>
  <th data-i18n="memory">内存</th>
  <th data-i18n="rss">实际占用</th>
</tr>
</thead>
<tbody id="processes">
<tr><td colspan="5" data-i18n="loading">加载中...</td></tr>
</tbody>
</table>
</div>

<div class="err" id="error"></div>
</main>

<script>
const translations = {
  zh: {
    loading: "加载中...",
    updated: "更新时间",
    cpu: "CPU",
    memory: "内存",
    disk: "磁盘",
    network: "网络",
    swap: "Swap",
    loadAverage: "平均负载",
    process: "进程",
    rss: "实际占用",
    used: "已用",
    total: "总计",
    oneMinuteLoad: "过去 1 分钟负载",
    fiveMinuteLoad: "过去 5 分钟负载",
    fifteenMinuteLoad: "过去 15 分钟负载",
    noData: "暂无数据",
    statusActive: "运行中",
    statusInactive: "已停止",
    statusFailed: "异常",
    statusUnknown: "未知",
    uptimeDay: "天",
    uptimeHour: "小时",
    uptimeMinute: "分钟",
    uptimePrefix: "已运行"
  },
  en: {
    loading: "Loading...",
    updated: "Updated",
    cpu: "CPU",
    memory: "Memory",
    disk: "Disk",
    network: "Network",
    swap: "Swap",
    loadAverage: "Load average",
    process: "Process",
    rss: "RSS",
    used: "Used",
    total: "Total",
    oneMinuteLoad: "1 minute load",
    fiveMinuteLoad: "5 minute load",
    fifteenMinuteLoad: "15 minute load",
    noData: "No data",
    statusActive: "Running",
    statusInactive: "Stopped",
    statusFailed: "Failed",
    statusUnknown: "Unknown",
    uptimeDay: "d",
    uptimeHour: "h",
    uptimeMinute: "m",
    uptimePrefix: "Up"
  }
};

let currentStatus = null;

function initialLanguage() {
  const saved = localStorage.getItem("ryo-monitor-lang");
  if (saved === "zh" || saved === "en") return saved;
  return navigator.language && navigator.language.toLowerCase().startsWith("zh") ? "zh" : "en";
}

let currentLang = initialLanguage();

function t(key) {
  return translations[currentLang][key] || translations.en[key] || key;
}

function text(id, value) {
  document.getElementById(id).textContent = value;
}

function applyStaticText() {
  document.documentElement.lang = currentLang === "zh" ? "zh-CN" : "en";
  document.querySelectorAll("[data-i18n]").forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  // 单按钮显示当前语言，点击切换到另一种。
  const langBtn = document.getElementById("lang-toggle");
  if (langBtn) langBtn.textContent = currentLang === "zh" ? "中文" : "EN";
}

function setLanguage(lang) {
  currentLang = lang;
  localStorage.setItem("ryo-monitor-lang", lang);
  applyStaticText();
  render(currentStatus);
}

// ---------- 主题（明暗）----------

function initialTheme() {
  const saved = localStorage.getItem("ryo-monitor-theme");
  if (saved === "light" || saved === "dark") return saved;
  return window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
}

let currentTheme = initialTheme();

function applyTheme() {
  document.documentElement.setAttribute("data-theme", currentTheme);
  const btn = document.getElementById("theme-toggle");
  if (btn) {
    btn.textContent = currentTheme === "dark" ? "☾" : "☀";
    btn.setAttribute("aria-label", currentTheme === "dark" ? "Switch to light theme" : "Switch to dark theme");
  }
}

function toggleTheme() {
  currentTheme = currentTheme === "dark" ? "light" : "dark";
  localStorage.setItem("ryo-monitor-theme", currentTheme);
  applyTheme();
}

function statusName(value) {
  if (value === "active") return t("statusActive");
  if (value === "inactive") return t("statusInactive");
  if (value === "failed") return t("statusFailed");
  if (value === "unknown") return t("statusUnknown");
  return value || "--";
}

function formatUptime(seconds, fallback) {
  if (!Number.isFinite(Number(seconds))) return fallback || "--";
  const total = Number(seconds);
  const days = Math.floor(total / 86400);
  const hours = Math.floor((total % 86400) / 3600);
  const minutes = Math.floor((total % 3600) / 60);
  if (currentLang === "zh") {
    if (days > 0) return `${t("uptimePrefix")} ${days}${t("uptimeDay")} ${hours}${t("uptimeHour")} ${minutes}${t("uptimeMinute")}`;
    if (hours > 0) return `${t("uptimePrefix")} ${hours}${t("uptimeHour")} ${minutes}${t("uptimeMinute")}`;
    return `${t("uptimePrefix")} ${minutes}${t("uptimeMinute")}`;
  }
  if (days > 0) return `${t("uptimePrefix")} ${days}${t("uptimeDay")} ${hours}${t("uptimeHour")} ${minutes}${t("uptimeMinute")}`;
  if (hours > 0) return `${t("uptimePrefix")} ${hours}${t("uptimeHour")} ${minutes}${t("uptimeMinute")}`;
  return `${t("uptimePrefix")} ${minutes}${t("uptimeMinute")}`;
}

function serviceList(s) {
  if (Array.isArray(s.services) && s.services.length > 0) {
    return s.services;
  }
  return [
    { name: "OpenList", status: s.openlist },
    { name: "Caddy", status: s.caddy },
    { name: "SSH", status: s.ssh }
  ];
}

function escapeAttr(value) {
  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;");
}

function renderServices(services) {
  const strip = document.querySelector(".service-strip");
  strip.innerHTML = services.map(service => {
    const safeName = escapeAttr(service.name || service.unit || "--");
    const status = service.status || "unknown";
    // 仅用左侧指示灯表示运行状态，名称旁不再显示状态文字；
    // hover 提示显示「监控目标 · 状态文字」，让卡片自解释。
    const tip = service.unit
      ? `${escapeAttr(service.unit)} · ${statusName(status)}`
      : statusName(status);
    return `<div class="pill ${status}" title="${tip}"><span class="dot"></span><span>${safeName}</span></div>`;
  }).join("") || `<div class="pill unknown"><span class="dot"></span><span>${t("noData")}</span></div>`;
}

function render(s) {
  if (!s) {
    text("subtitle", t("loading"));
    return;
  }

  text("subtitle", `${t("updated")}：${s.updated} · ${formatUptime(s.uptime_seconds, s.uptime)}`);

  renderServices(serviceList(s));

  text("cpu", s.cpu + "%");

  text("mem", s.mem_pct + "%");
  text("mem-detail", `${t("used")} ${s.mem_used}M\n${t("total")} ${s.mem_total}M`);

  text("disk", s.disk_pct);
  text("disk-detail", `${t("used")} ${s.disk_used}\n${t("total")} ${s.disk_total}`);

  text("net", "↓ " + s.rx_kb + " KB/s\n↑ " + s.tx_kb + " KB/s");

  text("swap", s.swap_pct + "%");
  text("swap-detail", `${t("used")} ${s.swap_used}M\n${t("total")} ${s.swap_total}M`);

  text("load",
    `${t("oneMinuteLoad")}：${s.load1}\n` +
    `${t("fiveMinuteLoad")}：${s.load5}\n` +
    `${t("fifteenMinuteLoad")}：${s.load15}`
  );

  document.getElementById("processes").innerHTML = (s.processes || []).map(p => `
    <tr>
      <td>${p.pid}</td>
      <td>${p.name}</td>
      <td>${p.cpu}%</td>
      <td>${p.mem}%</td>
      <td>${p.rss} MB</td>
    </tr>
  `).join("") || `<tr><td colspan="5">${t("noData")}</td></tr>`;

  text("error", "");
}

async function update() {
  try {
    const res = await fetch("/status.json?t=" + Date.now(), {cache: "no-store"});
    if (!res.ok) throw new Error("status.json HTTP " + res.status);
    currentStatus = await res.json();
    render(currentStatus);
  } catch (e) {
    text("error", String(e));
  }
}

document.getElementById("lang-toggle").addEventListener("click", () => {
  setLanguage(currentLang === "zh" ? "en" : "zh");
});
document.getElementById("theme-toggle").addEventListener("click", toggleTheme);

applyTheme();
applyStaticText();
render(null);
update();
setInterval(update, 1000);
</script>
</body>
</html>
